databases:
  - name: cea-db
    plan: free
    databaseName: cea
    user: cea

services:
  - type: web
    name: cea-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cea-db
          property: connectionString
      - key: FORMSPREE_ENDPOINT
        sync: false

  - type: cron
    name: cea-scraper
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scraper.py
    schedule: "0 1,13 * * *"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cea-db
          property: connectionString
      - key: FORMSPREE_ENDPOINT
        sync: false
